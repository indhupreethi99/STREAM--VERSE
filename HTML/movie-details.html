            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            category: "general",
            year: "Trending",

        };

        // Initialize URL Routing parameters
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const selected = moviesData[movieId] || defaultMovie;

        // Apply fields directly to dynamic layout components
        document.getElementById("movieTitle").innerText = selected.title;
        document.getElementById("movieGenre").innerText = selected.genre;
        document.getElementById("movieYear").innerText = selected.year;
        document.getElementById("movieStory").innerText = selected.story;
        document.getElementById("movieCast").innerText = selected.cast;
        document.getElementById("moviePoster").src = selected.poster;
        document.getElementById("movieTrailer").src = selected.trailer;
        document.getElementById("bgBlur").src = selected.poster; // Uses movie poster as ambient blurred background

        // Process Smart Category recommendation lists filtered seamlessly
        const likeGrid = document.getElementById("likeGrid");
        Object.keys(moviesData).forEach(key => {
            const item = moviesData[key];
            if (item.category === selected.category && key !== movieId) {
                const card = document.createElement("a");
                card.href = `movie-details.html?id=${key}`;
                card.className = "recom-card";
                card.innerHTML = `
                    <img src="${item.poster}" alt="${item.title}">
                    <h4>${item.title}</h4>
                `;
                likeGrid.appendChild(card);
            }
        });
